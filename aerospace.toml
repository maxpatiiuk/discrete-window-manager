# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    alt-backslash = 'layout tiles horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    alt-z = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace L1'
    alt-x = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace L2'
    alt-c = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace L3'
    alt-v = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace L4'
    alt-b = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace-tail L'
    alt-n = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace R1'
    alt-m = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace R2'
    alt-comma = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace R3'
    alt-period = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace R4'
    alt-slash = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace-tail R'
    alt-e = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace M0'
    alt-r = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace M1'
