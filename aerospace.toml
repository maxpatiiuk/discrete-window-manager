    alt-shift-period = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-move-node-to-workspace R4'
    alt-shift-slash = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-move-node-to-workspace-tail R'
