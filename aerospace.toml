# TODO: on other laptop: defaults write com.apple.spaces spans-displays -bool true && killall SystemUIServer (edit: not working well with full-screen youtube)
# TODO: on-window-detected
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
    'workspace R2',
    'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-arrange-windows',
]

exec-on-workspace-change = [
    '/Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion',
    'on-workspace-change',
]

start-at-login = true

accordion-padding = 0

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
#persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B",
#                         "C", "E", "F", "I", "M", "N", "O", "P", "Q",
#                         "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]
persistent-workspaces = []

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

on-focus-changed = [
    'move-mouse window-lazy-center',
    'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion on-workspace-change',
]

