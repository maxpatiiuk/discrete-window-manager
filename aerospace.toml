    alt-i = 'exec-and-forget /Users/maxpatiiuk/g/dotfiles/aerospace/target/release/aerospace-companion smart-switch-workspace-tail M'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
